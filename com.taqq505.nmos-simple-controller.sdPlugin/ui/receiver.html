<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Receiver Settings</title>
    <style>
        :root {
            --bg: #1c1c1c;
            --surface: #2a2a2a;
            --border: #3a3a3a;
            --text: #c8c8c8;
            --text-muted: #888;
            --accent: #4a9eff;
            --danger: #e05555;
            --radius: 4px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 9pt; padding: 8px; }

        .row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
        label { color: var(--text-muted); font-size: 8pt; text-transform: uppercase; letter-spacing: 0.04em; }

        select, input[type="text"] {
            width: 100%; padding: 5px 8px;
            background: var(--surface); color: var(--text);
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 9pt; font-family: var(--font); outline: none;
        }
        select:focus, input:focus { border-color: var(--accent); }

        .radio-group { display: flex; gap: 12px; }
        .radio-group label { display: flex; align-items: center; gap: 5px; color: var(--text); text-transform: none; letter-spacing: 0; font-size: 9pt; cursor: pointer; }
        .radio-group input[type="radio"] { accent-color: var(--accent); cursor: pointer; }

        .input-row { display: flex; gap: 6px; }
        .input-row input { flex: 1; }

        button {
            padding: 5px 12px;
            background: var(--accent); color: #fff;
            border: none; border-radius: var(--radius);
            font-size: 9pt; cursor: pointer; white-space: nowrap;
        }
        button:hover { filter: brightness(1.15); }
        button:active { filter: brightness(0.9); }
        button:disabled { background: var(--border); color: var(--text-muted); cursor: default; }

        .section { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 2px; }

        .status {
            font-size: 8pt; padding: 4px 8px; border-radius: var(--radius);
            background: var(--surface); color: var(--text-muted); margin-bottom: 6px;
        }
        .status.error { color: var(--danger); }
        .status.ok { color: #4caf50; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- Source mode -->
<div class="row">
    <label>Source Mode</label>
    <div class="radio-group">
        <label><input type="radio" name="sourceMode" value="manual" /> Manual</label>
        <label><input type="radio" name="sourceMode" value="bcc" checked /> From BCC</label>
    </div>
</div>

<!-- Manual mode -->
<div id="manualSection" class="section hidden">
    <div class="row">
        <label>IS-04 URL</label>
        <div class="input-row">
            <input type="text" id="manualUrl" placeholder="http://192.168.x.x:3000" />
            <button id="manualSearch">Search</button>
        </div>
    </div>
</div>

<!-- BCC mode -->
<div id="bccSection" class="section">
    <div class="row">
        <label>BCC Node</label>
        <select id="bccNode">
            <option value="">-- Select Node --</option>
        </select>
    </div>
</div>

<!-- Status -->
<div id="statusMsg" class="status hidden"></div>

<!-- Receiver dropdown (shown after IS-04 fetch) -->
<div id="receiverSection" class="section hidden">
    <div class="row">
        <label>Receiver</label>
        <select id="receiverSelect">
            <option value="">-- Select Receiver --</option>
        </select>
    </div>
</div>

<script>
    let ws, uuid;
    let settings = {};
    // Resources fetched from IS-04
    let fetchedReceivers = [];
    let fetchedIs05Url = '';
    let fetchedIs05Version = '';

    // ---------------------------------------------------------------------------
    // Stream Deck WebSocket handshake
    // ---------------------------------------------------------------------------
    function connectElgatoStreamDeckSocket(port, inUUID, inRegisterEvent, _info, inActionInfo) {
        uuid = inUUID;
        const actionInfo = JSON.parse(inActionInfo);
        settings = actionInfo.payload?.settings || {};

        ws = new WebSocket('ws://127.0.0.1:' + port);
        ws.onopen = () => {
            ws.send(JSON.stringify({ event: inRegisterEvent, uuid }));
            sendToPlugin({ event: 'getNodeList' });
            applySettings();
        };
        ws.onmessage = e => {
            const msg = JSON.parse(e.data);
            if (msg.event === 'didReceiveSettings') {
                settings = msg.payload.settings || {};
                applySettings();
            } else if (msg.event === 'sendToPropertyInspector') {
                handlePluginMessage(msg.payload);
            }
        };
    }

    function sendToPlugin(payload) {
        ws.send(JSON.stringify({ event: 'sendToPlugin', context: uuid, payload }));
    }

    function saveSettings(patch) {
        Object.assign(settings, patch);
        ws.send(JSON.stringify({ event: 'setSettings', context: uuid, payload: settings }));
    }

    // ---------------------------------------------------------------------------
    // Plugin → PI messages
    // ---------------------------------------------------------------------------
    function handlePluginMessage(payload) {
        if (payload.event === 'nodeList') {
            populateBccNodes(payload.nodes);
        } else if (payload.event === 'resources') {
            fetchedReceivers = payload.receivers || [];
            fetchedIs05Url = payload.is05Url || '';
            fetchedIs05Version = payload.is05Version || '';
            populateReceivers(fetchedReceivers);
            showStatus('');
        } else if (payload.event === 'error') {
            showStatus('Error: ' + payload.message, 'error');
        }
    }

    // ---------------------------------------------------------------------------
    // UI population
    // ---------------------------------------------------------------------------
    function populateBccNodes(nodes) {
        const sel = document.getElementById('bccNode');
        const prev = sel.value;
        sel.innerHTML = '<option value="">-- Select Node --</option>';
        (nodes || []).forEach(n => {
            const opt = document.createElement('option');
            opt.value = n.id;
            opt.dataset.url = n.is04_url;
            opt.textContent = n.name || n.id;
            sel.appendChild(opt);
        });
        // Restore saved selection
        if (settings.bccNodeId) {
            sel.value = settings.bccNodeId;
            if (!sel.value) sel.value = '';
        } else if (prev) {
            sel.value = prev;
        }
    }

    function populateReceivers(receivers) {
        const sel = document.getElementById('receiverSelect');
        sel.innerHTML = '<option value="">-- Select Receiver --</option>';
        receivers.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = '[' + r.format + '] ' + r.label;
            sel.appendChild(opt);
        });
        // Restore saved selection
        if (settings.receiverId) sel.value = settings.receiverId;
        document.getElementById('receiverSection').classList.toggle('hidden', receivers.length === 0);
    }

    function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.textContent = msg;
        el.className = 'status' + (type ? ' ' + type : '') + (msg ? '' : ' hidden');
    }

    // ---------------------------------------------------------------------------
    // Apply settings to UI
    // ---------------------------------------------------------------------------
    function applySettings() {
        const mode = settings.sourceMode || 'bcc';
        document.querySelector('input[name="sourceMode"][value="' + mode + '"]').checked = true;
        updateModeUI(mode);

        if (mode === 'manual' && settings.is04Url) {
            document.getElementById('manualUrl').value = settings.is04Url;
        }
        if (settings.bccNodeId) {
            document.getElementById('bccNode').value = settings.bccNodeId;
        }
        // If we already have a saved receiverId, show it immediately
        if (settings.receiverId && settings.receiverLabel) {
            const sel = document.getElementById('receiverSelect');
            let opt = sel.querySelector('option[value="' + settings.receiverId + '"]');
            if (!opt) {
                opt = document.createElement('option');
                opt.value = settings.receiverId;
                opt.textContent = settings.receiverLabel;
                sel.appendChild(opt);
            }
            sel.value = settings.receiverId;
            document.getElementById('receiverSection').classList.remove('hidden');
        }
    }

    function updateModeUI(mode) {
        document.getElementById('manualSection').classList.toggle('hidden', mode !== 'manual');
        document.getElementById('bccSection').classList.toggle('hidden', mode !== 'bcc');
    }

    // ---------------------------------------------------------------------------
    // Event handlers
    // ---------------------------------------------------------------------------
    document.querySelectorAll('input[name="sourceMode"]').forEach(radio => {
        radio.addEventListener('change', () => {
            const mode = radio.value;
            updateModeUI(mode);
            saveSettings({ sourceMode: mode });
            // Clear receiver section when mode changes
            document.getElementById('receiverSection').classList.add('hidden');
        });
    });

    document.getElementById('manualSearch').addEventListener('click', () => {
        const url = document.getElementById('manualUrl').value.trim();
        if (!url) return;
        saveSettings({ is04Url: url, sourceMode: 'manual' });
        showStatus('Connecting to IS-04...', '');
        sendToPlugin({ event: 'fetchResources', is04Url: url });
    });

    document.getElementById('bccNode').addEventListener('change', function () {
        const opt = this.options[this.selectedIndex];
        const nodeId = this.value;
        const is04Url = opt?.dataset?.url || '';
        const nodeName = opt?.textContent || '';
        if (!nodeId || !is04Url) return;
        saveSettings({ bccNodeId: nodeId, is04Url: is04Url, sourceMode: 'bcc', nodeLabel: nodeName });
        showStatus('Connecting to IS-04...', '');
        sendToPlugin({ event: 'fetchResources', is04Url: is04Url });
    });

    document.getElementById('receiverSelect').addEventListener('change', function () {
        const receiverId = this.value;
        const label = this.options[this.selectedIndex]?.textContent || '';
        if (!receiverId) return;
        saveSettings({
            receiverId,
            receiverLabel: label,
            is05Url: fetchedIs05Url,
            is05Version: fetchedIs05Version,
        });
    });
</script>
</body>
</html>
